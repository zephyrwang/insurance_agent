<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 920" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
  </defs>

  <style>
    .box { fill:#ffffff; stroke:#888; stroke-width:1.5; rx:10; }
    .agentbox { fill:#EEF0F8; stroke:#3C3489; stroke-width:1.5; rx:10; }
    .uwbox { fill:#E1F5EE; stroke:#0F6E56; stroke-width:1.5; rx:10; }
    .clbox { fill:#E6F1FB; stroke:#185FA5; stroke-width:1.5; rx:10; }
    .anbox { fill:#FAEEDA; stroke:#633806; stroke-width:1.5; rx:10; }
    .dbbox { fill:#F4F4F4; stroke:#555; stroke-width:1.5; rx:10; }
    .diamond { fill:#FFF7E0; stroke:#B8860B; stroke-width:1.5; }
    .label { font-size:14px; fill:#222; text-anchor:middle; }
    .sublabel { font-size:11px; fill:#666; text-anchor:middle; }
    .edge { stroke:#555; stroke-width:1.5; fill:none; marker-end:url(#arrow); }
    .title { font-size:20px; font-weight:bold; fill:#222; text-anchor:middle; }
  </style>

  <text x="550" y="30" class="title">Insurance Agent — Request Flow</text>

  <!-- User -->
  <rect class="box" x="470" y="55" width="160" height="45"/>
  <text x="550" y="83" class="label">User</text>

  <!-- Streamlit UI -->
  <rect class="box" x="430" y="135" width="240" height="55"/>
  <text x="550" y="158" class="label">Streamlit UI</text>
  <text x="550" y="175" class="sublabel">streamlit_app.py</text>

  <!-- API key decision -->
  <polygon class="diamond" points="550,215 650,260 550,305 450,260"/>
  <text x="550" y="255" class="label">GROQ_API_KEY</text>
  <text x="550" y="272" class="label">set?</text>

  <!-- Mock supervisor -->
  <rect class="box" x="700" y="232" width="220" height="55"/>
  <text x="810" y="255" class="label">MockSupervisorAgent</text>
  <text x="810" y="272" class="sublabel">mock_supervisor.py (demo mode)</text>

  <!-- Supervisor agent -->
  <rect class="agentbox" x="430" y="345" width="240" height="55"/>
  <text x="550" y="368" class="label">SupervisorAgent</text>
  <text x="550" y="385" class="sublabel">agents/supervisor_agent.py</text>

  <!-- Routing decision -->
  <polygon class="diamond" points="550,425 660,470 550,515 440,470"/>
  <text x="550" y="465" class="label">Route question</text>
  <text x="550" y="482" class="label">(keyword → LLM)</text>

  <!-- Specialist agents -->
  <rect class="uwbox" x="80" y="555" width="220" height="55"/>
  <text x="190" y="578" class="label">Underwriting Agent</text>
  <text x="190" y="595" class="sublabel">agents/underwriting_agent.py</text>

  <rect class="clbox" x="440" y="555" width="220" height="55"/>
  <text x="550" y="578" class="label">Claims Agent</text>
  <text x="550" y="595" class="sublabel">agents/claims_agent.py</text>

  <rect class="anbox" x="800" y="555" width="220" height="55"/>
  <text x="910" y="578" class="label">Analytics Agent</text>
  <text x="910" y="595" class="sublabel">agents/analytics_agent.py</text>

  <!-- Tools -->
  <rect class="box" x="80" y="650" width="220" height="55"/>
  <text x="190" y="673" class="label">Underwriting Tools</text>
  <text x="190" y="690" class="sublabel">tools/underwriting_tools.py + NL→SQL</text>

  <rect class="box" x="440" y="650" width="220" height="55"/>
  <text x="550" y="673" class="label">Claims Tools</text>
  <text x="550" y="690" class="sublabel">tools/claims_tools.py</text>

  <rect class="box" x="800" y="650" width="220" height="55"/>
  <text x="910" y="673" class="label">Analytics Tools</text>
  <text x="910" y="690" class="sublabel">tools/analytics_tools.py</text>

  <!-- Database -->
  <rect class="dbbox" x="380" y="745" width="340" height="60"/>
  <text x="550" y="770" class="label">Database (SQLite / MySQL)</text>
  <text x="550" y="788" class="sublabel">db/database.py — auto_policies, claims tables</text>

  <!-- Answer back -->
  <rect class="box" x="430" y="845" width="240" height="55"/>
  <text x="550" y="868" class="label">Markdown answer</text>
  <text x="550" y="885" class="sublabel">(table + comments) → rendered in UI</text>

  <!-- Edges -->
  <path class="edge" d="M550,100 L550,135"/>
  <text x="565" y="120" class="sublabel">question</text>

  <path class="edge" d="M550,190 L550,215"/>

  <path class="edge" d="M650,260 L700,260"/>
  <text x="675" y="250" class="sublabel">No</text>

  <path class="edge" d="M550,305 L550,345"/>
  <text x="565" y="328" class="sublabel">Yes</text>

  <path class="edge" d="M550,400 L550,425"/>

  <path class="edge" d="M550,515 L190,555"/>
  <text x="330" y="540" class="sublabel">underwriting</text>

  <path class="edge" d="M550,515 L550,555"/>
  <text x="600" y="540" class="sublabel">claims</text>

  <path class="edge" d="M550,515 L910,555"/>
  <text x="760" y="540" class="sublabel">analytics</text>

  <path class="edge" d="M190,610 L190,650"/>
  <path class="edge" d="M550,610 L550,650"/>
  <path class="edge" d="M910,610 L910,650"/>

  <path class="edge" d="M190,705 C190,730 380,775 380,775"/>
  <path class="edge" d="M550,705 L550,745"/>
  <path class="edge" d="M910,705 C910,730 720,775 720,775"/>

  <path class="edge" d="M550,805 L550,845"/>

  <!-- Mock to answer -->
  <path class="edge" d="M810,287 C810,500 810,750 670,872"/>
  <text x="900" y="450" class="sublabel">(demo response)</text>

  <!-- Answer back to UI / user -->
  <path class="edge" d="M430,872 C300,872 300,160 430,162"/>
  <text x="270" y="500" class="sublabel">rendered response</text>

</svg>
